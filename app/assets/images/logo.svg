<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lewsnetter primary wordmark — light backgrounds.

  Mark: "Lewsnetter" in Geist 600 + the brand orange dot (#EA580C) to the right.
  Type is rendered as <text> with the Geist family loaded from Google Fonts via
  the <style> @import below. In browsers this resolves to Geist; on systems
  without Geist available (e.g. raw rasterization with rsvg-convert) it falls
  through the stack — still legible. For pixel-locked PNG output (e.g. the
  Open Graph image) use an environment that has Geist installed, or convert
  the <text> nodes to outlined <path>s.

  Tracking, dot diameter, and gap are matched to the in-app top-nav wordmark
  in app/views/themes/light/menu/_logo.html.erb so the marketing site and the
  signed-in product feel like one brand.

  Per DESIGN.md → Color → Accent: light-mode orange is #EA580C (orange-600).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 64" role="img" aria-label="Lewsnetter">
  <title>Lewsnetter</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist:wght@600&display=swap');
    .wordmark {
      font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-weight: 600;
      font-size: 40px;
      letter-spacing: -0.02em;
      fill: #09090B; /* zinc-950 */
    }
  </style>
  <text class="wordmark" x="0" y="46">Lewsnetter</text>
  <!-- Brand accent dot. Diameter 10, positioned just past the wordmark's
       right edge with optical-baseline alignment (sits on the x-height row,
       not the cap-line) so it reads as a period-like mark, not a separate
       graphic element. Visually tuned for Geist 600 at 40px. -->
  <circle cx="270" cy="42" r="6" fill="#EA580C"/>
</svg>
