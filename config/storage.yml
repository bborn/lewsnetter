local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage#{ENV['TEST_ENV_NUMBER']}") %>

amazon:
  service: S3
  # Cloudflare R2 (S3-compatible). Keys live in
  # credentials.cloudflare.r2_uploads (see config/credentials.yml.enc).
  access_key_id: <%= Rails.application.credentials.dig(:cloudflare, :r2_uploads, :access_key_id) %>
  secret_access_key: <%= Rails.application.credentials.dig(:cloudflare, :r2_uploads, :secret_access_key) %>
  region: auto
  bucket: <%= Rails.application.credentials.dig(:cloudflare, :r2_uploads, :bucket) || "lewsnetter-uploads" %>
  endpoint: <%= Rails.application.credentials.dig(:cloudflare, :r2_uploads, :endpoint) || "https://407493dfba8306ff79bb5cd68f609eb0.r2.cloudflarestorage.com" %>
  force_path_style: true
  request_checksum_calculation: when_required
  response_checksum_validation: when_required

# Dedicated bucket for email images (EmailImage#file). SEPARATE from the
# `amazon` bucket — that one also holds subscriber-CSV imports; keeping
# email media in its own bucket is tidy isolation.
#
# This service is PRIVATE (no `public: true`). Email images reach inboxes
# via a Rails redirect: GET /e/:id → EmailImagesController#show → 302 to a
# freshly-signed R2 URL. That signed URL only needs to outlive the few ms
# it takes the image client to follow the redirect, so the bucket never
# needs public access or a custom domain. The permanent, branded URL is
# the Rails route, served on the team's own email host — see
# EmailImage#public_url.
#
# In test + dev the service is local Disk — EmailImage#file hardcodes
# `service: :email_media`, so without this branch every test that attaches
# a file would try to hit the real R2 bucket and fail with NoSuchBucket.
#
# In production, R2 is OPTIONAL: use the dedicated R2 bucket when R2 upload
# credentials are present, otherwise fall back to local Disk on the persistent
# /rails/storage volume. Email images reach inboxes via the /e/:id Rails
# redirect (EmailImage#public_url) regardless of backing store, so the local
# Disk path works fine for a zero-R2 self-hosted deploy.
<%
  r2_configured =
    Rails.application.credentials.dig(:cloudflare, :r2_uploads, :access_key_id).present? ||
    ENV["LITESTREAM_REPLICA_BUCKET"].present?
%>
<% if Rails.env.test? %>
email_media:
  service: Disk
  root: <%= Rails.root.join("tmp/storage_email_media#{ENV["TEST_ENV_NUMBER"]}") %>
<% elsif Rails.env.development? %>
email_media:
  service: Disk
  root: <%= Rails.root.join("storage_email_media") %>
<% elsif r2_configured %>
email_media:
  service: S3
  access_key_id: <%= Rails.application.credentials.dig(:cloudflare, :r2_uploads, :access_key_id) %>
  secret_access_key: <%= Rails.application.credentials.dig(:cloudflare, :r2_uploads, :secret_access_key) %>
  region: auto
  bucket: lewsnetter-email-media
  endpoint: <%= Rails.application.credentials.dig(:cloudflare, :r2_uploads, :endpoint) || "https://407493dfba8306ff79bb5cd68f609eb0.r2.cloudflarestorage.com" %>
  force_path_style: true
  request_checksum_calculation: when_required
  response_checksum_validation: when_required
<% else %>
email_media:
  service: Disk
  root: <%= Rails.root.join("storage", "email_media") %>
<% end %>

cloudinary:
  service: Cloudinary
