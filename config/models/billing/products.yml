# Lewsnetter billing plans — one paid tier, $10/mo per team.
# `amount` is in the smallest currency unit (cents for USD).
#
# Run `rake billing:stripe:populate_products_in_stripe` after deploying
# any change here to sync the product + price into Stripe. The rake task
# outputs the STRIPE_PRICE_* env-var names to copy into deploy config.
free:
  # Implicit free tier — every team starts here. No price, no limits
  # while in beta; we can layer caps in later if abuse becomes an issue.
  # Empty `prices` (not a missing key) so BT's YAML loader sees a hash.
  prices: {}

pro:
  price: pro_monthly_2026
  prices:
    pro_monthly_2026:
      amount: 1000        # $10.00 in cents
      currency: USD
      duration: 1
      interval: month
