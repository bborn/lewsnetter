en:
  segments: &segments
    label: &label Segments
    breadcrumbs:
      label: *label
    navigation:
      label: *label
      icon: fal fa-puzzle-piece
    buttons: &buttons
      new: Add New Segment
      create: Create Segment
      edit: Edit Segment
      update: Update Segment
      destroy: Remove Segment
      shorthand:
        edit: Edit
        destroy: Delete
      confirmations:
        # TODO customize for your use-case.
        destroy: Are you sure you want to remove %{segment_name}? This will also remove any child resources and can't be undone.
    segment:
      buttons: *buttons
    fields: &fields
      id:
        heading: Segment ID
      team_id:
        heading: Team ID
      name:
        _: &name Name
        label: *name
        heading: *name
        api_title: *name
        api_description: *name
      natural_language_source:
        _: &natural_language_source Natural Language Source
        label: *natural_language_source
        heading: *natural_language_source
        api_title: *natural_language_source
        api_description: *natural_language_source
      # 🚅 super scaffolding will insert new fields above this line.
      created_at:
        _: &created_at Added
        label: *created_at
        heading: *created_at
      updated_at:
        _: &updated_at Updated
        label: *updated_at
        heading: *updated_at
    api:
      collection_actions: "Collection Actions for Segments"
      index: "List Segments"
      create: "Add a New Segment"
      member_actions: "Actions for an Individual Segment"
      show: "Retrieve a Segment"
      update: "Update a Segment"
      destroy: "Delete a Segment"
      fields: *fields
    index:
      section: "%{teams_possessive} Segments"
      contexts:
        team:
          header: Segments
          description: Saved targets for campaigns. Filter your audience down for specific sends — or leave a campaign's Segment blank to send to everyone subscribed.
          description_empty: Lewsnetter doesn't have separate lists — there's one audience per team. Use Segments to filter your audience for targeted campaigns, or leave a campaign's Segment blank to send to everyone subscribed.
      fields: *fields
      buttons: *buttons
    show:
      section: "%{segment_name}"
      header: Segment Details
      description: Below are the details we have for %{segment_name}.
      manage_description: You'll also find options for updating these details or removing %{segment_name} from %{team_name} entirely.
      fields: *fields
      buttons: *buttons
    form: &form
      buttons: *buttons
      fields: *fields
    new:
      section: "New Segment for %{team_name}"
      header: New Segment Details
      description: Please provide the details of the new Segment you'd like to add to %{team_name}.
      form: *form
    edit:
      section: "%{segment_name}"
      header: Edit Segment Details
      description: You can update the details or settings for %{segment_name} below.
      form: *form
    notifications:
      created: Segment was successfully created.
      updated: Segment was successfully updated.
      destroyed: Segment was successfully destroyed.
  account:
    segments: *segments
  activerecord:
    attributes:
      segment:
        name: *name
        natural_language_source: *natural_language_source
        # 🚅 super scaffolding will insert new activerecord attributes above this line.
        created_at: *created_at
        updated_at: *updated_at
