en:
  email_templates: &email_templates
    label: &label Email Templates
    breadcrumbs:
      label: *label
    navigation:
      label: *label
      icon: fal fa-puzzle-piece
    buttons: &buttons
      new: Add New Email Template
      create: Create Email Template
      edit: Edit Email Template
      update: Update Email Template
      destroy: Remove Email Template
      shorthand:
        edit: Edit
        destroy: Delete
      confirmations:
        # TODO customize for your use-case.
        destroy: Are you sure you want to remove %{email_template_name}? This will also remove any child resources and can't be undone.
    email_template:
      buttons: *buttons
    fields: &fields
      id:
        heading: Email Template ID
      team_id:
        heading: Team ID
      name:
        _: &name Name
        label: *name
        heading: *name
        api_title: *name
        api_description: *name
      mjml_body:
        _: &mjml_body MJML source
        label: *mjml_body
        heading: *mjml_body
        api_title: *mjml_body
        api_description: *mjml_body
        help: "The reusable email layout (header, footer, brand colors). Use <code>{{body}}</code> as a placeholder for each campaign's content. <code>{{first_name}}</code>, <code>{{name}}</code>, <code>{{email}}</code>, and <code>{{unsubscribe_url}}</code> are also available."
      # 🚅 super scaffolding will insert new fields above this line.
      created_at:
        _: &created_at Added
        label: *created_at
        heading: *created_at
      updated_at:
        _: &updated_at Updated
        label: *updated_at
        heading: *updated_at
    api:
      collection_actions: "Collection Actions for Email Templates"
      index: "List Email Templates"
      create: "Add a New Email Template"
      member_actions: "Actions for an Individual Email Template"
      show: "Retrieve a Email Template"
      update: "Update a Email Template"
      destroy: "Delete a Email Template"
      fields: *fields
    index:
      section: "%{teams_possessive} Email Templates"
      contexts:
        team:
          header: Email Templates
          description: Reusable layouts (logo, footer, brand colors) for your sends. Build a template once and use it across many campaigns.
          description_empty: "Templates are the reusable layout for your sends — logo, footer, brand colors. Build one and reuse it across every campaign."
      fields: *fields
      buttons: *buttons
    show:
      section: "%{email_template_name}"
      header: Email template
      description: Reusable layout for your campaigns.
      manage_description: Update the MJML or remove this template.
      fields: *fields
      buttons: *buttons
    form: &form
      buttons: *buttons
      fields: *fields
    new:
      section: "Create a template"
      header: Create a template
      description: Define the reusable layout for your sends (logo, footer, brand colors). Use <code>{{body}}</code> where each campaign's content should appear.
      form: *form
    edit:
      section: "%{email_template_name}"
      header: Edit template
      description: Update the MJML source for this template.
      form: *form
    notifications:
      created: Email Template was successfully created.
      updated: Email Template was successfully updated.
      destroyed: Email Template was successfully destroyed.
  account:
    email_templates: *email_templates
  activerecord:
    attributes:
      email_template:
        name: *name
        mjml_body: *mjml_body
        # 🚅 super scaffolding will insert new activerecord attributes above this line.
        created_at: *created_at
        updated_at: *updated_at
