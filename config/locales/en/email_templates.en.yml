en:
  email_templates: &email_templates
    label: &label Email Templates
    breadcrumbs:
      label: *label
    navigation:
      label: *label
      icon: fal fa-puzzle-piece
    buttons: &buttons
      new: Add New Email Template
      create: Create Email Template
      edit: Edit Email Template
      update: Update Email Template
      destroy: Remove Email Template
      shorthand:
        edit: Edit
        destroy: Delete
      confirmations:
        # TODO customize for your use-case.
        destroy: Are you sure you want to remove %{email_template_name}? This will also remove any child resources and can't be undone.
    email_template:
      buttons: *buttons
    fields: &fields
      id:
        heading: Email Template ID
      team_id:
        heading: Team ID
      name:
        _: &name Name
        label: *name
        heading: *name
        api_title: *name
        api_description: *name
      mjml_body:
        _: &mjml_body Mjml Body
        label: *mjml_body
        heading: *mjml_body
        api_title: *mjml_body
        api_description: *mjml_body
      # 🚅 super scaffolding will insert new fields above this line.
      created_at:
        _: &created_at Added
        label: *created_at
        heading: *created_at
      updated_at:
        _: &updated_at Updated
        label: *updated_at
        heading: *updated_at
    api:
      collection_actions: "Collection Actions for Email Templates"
      index: "List Email Templates"
      create: "Add a New Email Template"
      member_actions: "Actions for an Individual Email Template"
      show: "Retrieve a Email Template"
      update: "Update a Email Template"
      destroy: "Delete a Email Template"
      fields: *fields
    index:
      section: "%{teams_possessive} Email Templates"
      contexts:
        team:
          header: Email Templates
          description: Below is a list of Email Templates that have been added for %{team_name}.
          description_empty: No Email Templates have been added for %{team_name}.
      fields: *fields
      buttons: *buttons
    show:
      section: "%{email_template_name}"
      header: Email Template Details
      description: Below are the details we have for %{email_template_name}.
      manage_description: You'll also find options for updating these details or removing %{email_template_name} from %{team_name} entirely.
      fields: *fields
      buttons: *buttons
    form: &form
      buttons: *buttons
      fields: *fields
    new:
      section: "New Email Template for %{team_name}"
      header: New Email Template Details
      description: Please provide the details of the new Email Template you'd like to add to %{team_name}.
      form: *form
    edit:
      section: "%{email_template_name}"
      header: Edit Email Template Details
      description: You can update the details or settings for %{email_template_name} below.
      form: *form
    notifications:
      created: Email Template was successfully created.
      updated: Email Template was successfully updated.
      destroyed: Email Template was successfully destroyed.
  account:
    email_templates: *email_templates
  activerecord:
    attributes:
      email_template:
        name: *name
        mjml_body: *mjml_body
        # 🚅 super scaffolding will insert new activerecord attributes above this line.
        created_at: *created_at
        updated_at: *updated_at
