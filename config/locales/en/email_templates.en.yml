en:
  email_templates: &email_templates
    label: &label EmailTemplates
    breadcrumbs:
      label: *label
    navigation:
      label: *label
      icon: fal fa-puzzle-piece
    buttons: &buttons
      new: Add New EmailTemplate
      create: Create EmailTemplate
      edit: Edit EmailTemplate
      update: Update EmailTemplate
      destroy: Remove EmailTemplate
      shorthand:
        edit: Edit
        destroy: Delete
      confirmations:
        # TODO customize for your use-case.
        destroy: Are you sure you want to remove %{email_template_name}? This will also remove any child resources and can't be undone.
    email_template:
      buttons: *buttons
    fields: &fields
      id:
        heading: EmailTemplate ID
      team_id:
        heading: Team ID
      name:
        _: &name Name
        label: *name
        heading: *name
        api_title: *name
        api_description: *name
      mjml_body:
        _: &mjml_body Mjml Body
        label: *mjml_body
        heading: *mjml_body
        api_title: *mjml_body
        api_description: *mjml_body
      # 🚅 super scaffolding will insert new fields above this line.
      created_at:
        _: &created_at Added
        label: *created_at
        heading: *created_at
      updated_at:
        _: &updated_at Updated
        label: *updated_at
        heading: *updated_at
    api:
      collection_actions: "Collection Actions for EmailTemplates"
      index: "List EmailTemplates"
      create: "Add a New EmailTemplate"
      member_actions: "Actions for an Individual EmailTemplate"
      show: "Retrieve a EmailTemplate"
      update: "Update a EmailTemplate"
      destroy: "Delete a EmailTemplate"
      fields: *fields
    index:
      section: "%{teams_possessive} EmailTemplates"
      contexts:
        team:
          header: EmailTemplates
          description: Below is a list of EmailTemplates that have been added for %{team_name}.
          description_empty: No EmailTemplates have been added for %{team_name}.
      fields: *fields
      buttons: *buttons
    show:
      section: "%{email_template_name}"
      header: EmailTemplate Details
      description: Below are the details we have for %{email_template_name}.
      manage_description: You'll also find options for updating these details or removing %{email_template_name} from %{team_name} entirely.
      fields: *fields
      buttons: *buttons
    form: &form
      buttons: *buttons
      fields: *fields
    new:
      section: "New EmailTemplate for %{team_name}"
      header: New EmailTemplate Details
      description: Please provide the details of the new EmailTemplate you'd like to add to %{team_name}.
      form: *form
    edit:
      section: "%{email_template_name}"
      header: Edit EmailTemplate Details
      description: You can update the details or settings for %{email_template_name} below.
      form: *form
    notifications:
      created: EmailTemplate was successfully created.
      updated: EmailTemplate was successfully updated.
      destroyed: EmailTemplate was successfully destroyed.
  account:
    email_templates: *email_templates
  activerecord:
    attributes:
      email_template:
        name: *name
        mjml_body: *mjml_body
        # 🚅 super scaffolding will insert new activerecord attributes above this line.
        created_at: *created_at
        updated_at: *updated_at
