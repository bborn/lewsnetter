en:
  events: &events
    label: &label Events
    breadcrumbs:
      label: *label
    navigation:
      label: *label
      icon: fal fa-puzzle-piece
    buttons: &buttons
      new: Add New Event
      create: Create Event
      edit: Edit Event
      update: Update Event
      destroy: Remove Event
      shorthand:
        edit: Edit
        destroy: Delete
      confirmations:
        # TODO customize for your use-case.
        destroy: Are you sure you want to remove %{event_name}? This will also remove any child resources and can't be undone.
    event:
      buttons: *buttons
    fields: &fields
      id:
        heading: Event ID
      subscriber_id:
        heading: Subscriber ID
      name:
        _: &name Name
        label: *name
        heading: *name
        api_title: *name
        api_description: *name
      occurred_at:
        _: &occurred_at Occurred At
        label: *occurred_at
        heading: *occurred_at
        api_title: *occurred_at
        api_description: *occurred_at
      # 🚅 super scaffolding will insert new fields above this line.
      created_at:
        _: &created_at Added
        label: *created_at
        heading: *created_at
      updated_at:
        _: &updated_at Updated
        label: *updated_at
        heading: *updated_at
    api:
      collection_actions: "Collection Actions for Events"
      index: "List Events"
      create: "Add a New Event"
      member_actions: "Actions for an Individual Event"
      show: "Retrieve a Event"
      update: "Update a Event"
      destroy: "Delete a Event"
      fields: *fields
    index:
      section: "%{subscribers_possessive} Events"
      contexts:
        subscriber:
          header: Events
          description: Below is a list of Events that have been added for %{subscriber_name}.
          description_empty: No Events have been added for %{subscriber_name}.
      fields: *fields
      buttons: *buttons
    show:
      section: "%{event_name}"
      header: Event Details
      description: Below are the details we have for %{event_name}.
      manage_description: You'll also find options for updating these details or removing %{event_name} from %{subscriber_name} entirely.
      fields: *fields
      buttons: *buttons
    form: &form
      buttons: *buttons
      fields: *fields
    new:
      section: "New Event for %{subscriber_name}"
      header: New Event Details
      description: Please provide the details of the new Event you'd like to add to %{subscriber_name}.
      form: *form
    edit:
      section: "%{event_name}"
      header: Edit Event Details
      description: You can update the details or settings for %{event_name} below.
      form: *form
    notifications:
      created: Event was successfully created.
      updated: Event was successfully updated.
      destroyed: Event was successfully destroyed.
  account:
    events: *events
  activerecord:
    attributes:
      event:
        name: *name
        occurred_at: *occurred_at
        # 🚅 super scaffolding will insert new activerecord attributes above this line.
        created_at: *created_at
        updated_at: *updated_at
