en:
  events: &events
    label: &label Events
    breadcrumbs:
      label: *label
    navigation:
      label: *label
      icon: fal fa-puzzle-piece
    buttons: &buttons
      new: Add New Event
      create: Create Event
      edit: Edit Event
      update: Update Event
      destroy: Remove Event
      shorthand:
        edit: Edit
        destroy: Delete
      confirmations:
        # TODO customize for your use-case.
        destroy: Are you sure you want to remove %{event_name}? This will also remove any child resources and can't be undone.
    event:
      buttons: *buttons
    fields: &fields
      id:
        heading: Event ID
      subscriber_id:
        heading: Subscriber ID
      name:
        _: &name Name
        label: *name
        heading: *name
        api_title: *name
        api_description: *name
      occurred_at:
        _: &occurred_at Occurred At
        label: *occurred_at
        heading: *occurred_at
        api_title: *occurred_at
        api_description: *occurred_at
      # 🚅 super scaffolding will insert new fields above this line.
      created_at:
        _: &created_at Added
        label: *created_at
        heading: *created_at
      updated_at:
        _: &updated_at Updated
        label: *updated_at
        heading: *updated_at
    api:
      collection_actions: "Collection Actions for Events"
      index: "List Events"
      create: "Add a New Event"
      member_actions: "Actions for an Individual Event"
      show: "Retrieve a Event"
      update: "Update a Event"
      destroy: "Delete a Event"
      fields: *fields
    index:
      section: "%{subscribers_possessive} Events"
      contexts:
        subscriber:
          header: Events
          description: Engagement events recorded for this subscriber (opens, clicks, custom events).
          description_empty: No events yet for this subscriber.
      fields: *fields
      buttons: *buttons
    show:
      section: "%{event_name}"
      header: Event
      description: Details for this event.
      manage_description: Update or remove this event.
      fields: *fields
      buttons: *buttons
    form: &form
      buttons: *buttons
      fields: *fields
    new:
      section: "Add an event"
      header: Add an event
      description: Record an engagement event for this subscriber.
      form: *form
    edit:
      section: "%{event_name}"
      header: Edit event
      description: Update this event.
      form: *form
    notifications:
      created: Event was successfully created.
      updated: Event was successfully updated.
      destroyed: Event was successfully destroyed.
  account:
    events: *events
  activerecord:
    attributes:
      event:
        name: *name
        occurred_at: *occurred_at
        # 🚅 super scaffolding will insert new activerecord attributes above this line.
        created_at: *created_at
        updated_at: *updated_at
