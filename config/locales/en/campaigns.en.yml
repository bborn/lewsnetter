en:
  campaigns: &campaigns
    label: &label Campaigns
    breadcrumbs:
      label: *label
    navigation:
      label: *label
      icon: fal fa-puzzle-piece
    buttons: &buttons
      new: Add New Campaign
      create: Create Campaign
      edit: Edit Campaign
      update: Update Campaign
      destroy: Remove Campaign
      shorthand:
        edit: Edit
        destroy: Delete
      confirmations:
        # TODO customize for your use-case.
        destroy: Are you sure you want to remove %{campaign_name}? This will also remove any child resources and can't be undone.
    campaign:
      buttons: *buttons
    fields: &fields
      id:
        heading: Campaign ID
      team_id:
        heading: Team ID
      subject:
        _: &subject Subject
        label: *subject
        heading: *subject
        api_title: *subject
        api_description: *subject
      preheader:
        _: &preheader Preheader
        label: *preheader
        heading: *preheader
        api_title: *preheader
        api_description: *preheader
      body_markdown:
        _: &body_markdown Body
        label: *body_markdown
        heading: *body_markdown
        api_title: *body_markdown
        api_description: "Markdown body. Compiled into the email template's {{body}} placeholder at send time."
        help: "Write your campaign body in markdown. Headings, lists, links, code, emphasis, blockquotes. The template provides the header + footer chrome."
      body_mjml:
        _: &body_mjml Raw MJML (advanced)
        label: *body_mjml
        heading: *body_mjml
        api_title: *body_mjml
        api_description: "Legacy raw MJML body. Used only when body_markdown is blank."
      status:
        _: &status Status
        label: *status
        heading: *status
        api_title: *status
        api_description: *status
      scheduled_for:
        _: &scheduled_for Scheduled For
        label: *scheduled_for
        heading: *scheduled_for
        api_title: *scheduled_for
        api_description: *scheduled_for
      email_template_id: &template
        _: &email_template_id Template
        label: *email_template_id
        heading: *email_template_id
        api_title: *email_template_id
        api_description: *email_template_id
        placeholder: None
      template: *template
      segment_id: &segment
        _: &segment_id Segment
        label: *segment_id
        heading: *segment_id
        api_title: *segment_id
        api_description: *segment_id
        placeholder: "— Send to everyone subscribed —"
        help: "Leave blank to send to everyone subscribed. Pick a Segment to filter your audience for this campaign."
      segment: *segment
      # 🚅 super scaffolding will insert new fields above this line.
      created_at:
        _: &created_at Added
        label: *created_at
        heading: *created_at
      updated_at:
        _: &updated_at Updated
        label: *updated_at
        heading: *updated_at
    api:
      collection_actions: "Collection Actions for Campaigns"
      index: "List Campaigns"
      create: "Add a New Campaign"
      member_actions: "Actions for an Individual Campaign"
      show: "Retrieve a Campaign"
      update: "Update a Campaign"
      destroy: "Delete a Campaign"
      fields: *fields
    index:
      section: "%{teams_possessive} Campaigns"
      contexts:
        team:
          header: Campaigns
          description: Newsletters you've drafted, scheduled, or sent. Pick one to edit, send a test, or ship it.
          description_empty: "Send your first newsletter. Subject, body, audience, ship it — it'll show up here once you compose one."
      fields: *fields
      buttons: *buttons
    show:
      section: "%{campaign_name}"
      header: Campaign
      description: Details for this campaign.
      manage_description: Update content, audience, or scheduling — or remove the campaign.
      fields: *fields
      buttons: *buttons
    form: &form
      buttons: *buttons
      fields: *fields
    new:
      section: "Compose a campaign"
      header: Compose a campaign
      description: Draft a newsletter — subject, body, audience, schedule. You'll be able to preview and send a test before shipping it.
      form: *form
    edit:
      section: "%{campaign_name}"
      header: Edit campaign
      description: Update content, audience, or scheduling for this campaign.
      form: *form
    notifications:
      created: Campaign was successfully created.
      updated: Campaign was successfully updated.
      destroyed: Campaign was successfully destroyed.
  account:
    campaigns: *campaigns
  activerecord:
    attributes:
      campaign:
        subject: *subject
        preheader: *preheader
        body_markdown: *body_markdown
        body_mjml: *body_mjml
        status: *status
        scheduled_for: *scheduled_for
        email_template_id: *email_template_id
        segment_id: *segment_id
        # 🚅 super scaffolding will insert new activerecord attributes above this line.
        created_at: *created_at
        updated_at: *updated_at
