en:
  sender_addresses: &sender_addresses
    label: &label Sender Addresses
    breadcrumbs:
      label: *label
    navigation:
      label: *label
      icon: ti ti-email
    buttons: &buttons
      new: Add New Sender Address
      create: Create Sender Address
      edit: Edit Sender Address
      update: Update Sender Address
      destroy: Remove Sender Address
      recheck: Re-check with SES
      shorthand:
        edit: Edit
        destroy: Delete
      confirmations:
        # TODO customize for your use-case.
        destroy: Are you sure you want to remove %{sender_address_name}? This will also remove any child resources and can't be undone.
    sender_address:
      buttons: *buttons
    fields: &fields
      id:
        heading: Sender Address ID
      team_id:
        heading: Team ID
      email:
        _: &email Email
        label: *email
        heading: *email
        api_title: *email
        api_description: *email
      name:
        _: &name Name
        label: *name
        heading: *name
        api_title: *name
        api_description: *name
      verified:
        _: &verified Verified
        label: *verified
        heading: *verified
        api_title: *verified
        api_description: *verified
        options:
          yes: "Yes"
          no: "No"
      ses_status:
        _: &ses_status SES Status
        label: *ses_status
        heading: *ses_status
        api_title: *ses_status
        api_description: *ses_status
        values:
          success: "Verified for sending"
          pending: "Verification pending"
          failed: "Verification failed"
          temporary_failure: "Temporary failure — re-check soon"
          not_started: "Not started"
          not_in_ses: "Not yet added to SES"
          unconfigured: "Team SES credentials not configured"
          error: "Error contacting SES"
          unknown: "Unknown"
      # 🚅 super scaffolding will insert new fields above this line.
      created_at:
        _: &created_at Added
        label: *created_at
        heading: *created_at
      updated_at:
        _: &updated_at Updated
        label: *updated_at
        heading: *updated_at
    api:
      collection_actions: "Collection Actions for Sender Addresses"
      index: "List Sender Addresses"
      create: "Add a New Sender Address"
      member_actions: "Actions for an Individual Sender Address"
      show: "Retrieve a Sender Address"
      update: "Update a Sender Address"
      destroy: "Delete a Sender Address"
      fields: *fields
    index:
      section: "%{teams_possessive} Sender Addresses"
      contexts:
        team:
          header: Sender Addresses
          description: The from-addresses your recipients see in their inbox. Each must be verified by Amazon SES before you can send from it.
          description_empty: "Add a sender address. This is the from-address recipients see in their inbox — it must be verified by Amazon SES before you can send from it."
      fields: *fields
      buttons: *buttons
    show:
      section: "%{sender_address_name}"
      header: Sender address
      description: From-address details and SES verification status.
      manage_description: Update this sender address or remove it from your team.
      fields: *fields
      buttons: *buttons
      badges:
        verified: "✓ Verified by SES"
        unverified: "Not verified"
      ses_status:
        unknown: "Unknown"
    form: &form
      buttons: *buttons
      fields: *fields
    new:
      section: "Add a sender address"
      header: Add a sender address
      description: The from-address recipients see in their inbox. Amazon SES must verify you own this address before you can send from it.
      form: *form
    edit:
      section: "%{sender_address_name}"
      header: Edit sender address
      description: Update this sender address.
      form: *form
    notifications:
      created: Sender Address was successfully created.
      updated: Sender Address was successfully updated.
      destroyed: Sender Address was successfully destroyed.
      rechecked: Re-checked Sender Address with SES.
  account:
    sender_addresses: *sender_addresses
  activerecord:
    attributes:
      sender_address:
        email: *email
        name: *name
        verified: *verified
        ses_status: *ses_status
        # 🚅 super scaffolding will insert new activerecord attributes above this line.
        created_at: *created_at
        updated_at: *updated_at
