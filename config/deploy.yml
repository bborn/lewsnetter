# Kamal 2 deploy config for Lewsnetter v2.
#
# Single Hetzner CPX21 box in Ashburn, VA (lewsnetter-app1, 178.156.185.100)
# runs two container roles off the same image:
#   - web    Rails + Litestream replicator + Solid Cable (Puma on :3000)
#   - worker Solid Queue worker process
#
# SQLite databases live on a named volume (lewsnetter_storage) at /rails/storage.
# Litestream streams them to Cloudflare R2 — see litestream.yml.
#
# Secrets live in .kamal/secrets (not committed) and GitHub Actions secrets
# for CI deploys. See initiatives/lewsnetter-v2/DEPLOY.md.

service: lewsnetter

# Container image — pushed to GHCR by the build step on each deploy.
image: bborn/lewsnetter

servers:
  web:
    hosts:
      - 178.156.185.100
    options:
      add-host: host.docker.internal:host-gateway
  worker:
    hosts:
      - 178.156.185.100
    cmd: bundle exec rake solid_queue:start

# Cloudflare proxy is ON in front of this app (orange-cloud). We terminate
# TLS at kamal-proxy using a Cloudflare Origin CA certificate (cert + key
# stashed in .kamal/secrets as ORIGIN_CERT / ORIGIN_KEY) so the CF→origin
# leg is also encrypted. With this in place Bruno flips CF SSL mode from
# "Flexible" to "Full (Strict)" in the dashboard — see
# initiatives/lewsnetter-v2/SSL_FULL_STRICT_VERIFICATION.md.
#
# Mechanism: Option A — Kamal 2's native `proxy.ssl.{certificate_pem,
# private_key_pem}` keys (see Kamal::Configuration::Proxy#custom_ssl_certificate?
# and Kamal::Cli::App::SslCertificates). Kamal reads the named secrets from
# .kamal/secrets and, before each app boot, uploads them to the host TLS
# directory and bind-mounts them into the kamal-proxy container as
# /home/kamal-proxy/.apps-config/<service>/<role>/tls/{cert,key}.pem. No
# host-side bind-mount hook needed.
#
# Note: the current Origin CA cert SANs are *.whinynil.co + whinynil.co +
# lewsnetter.whinynil.co. The cert does NOT cover email.influencekit.com,
# which lives in a different CF zone — kamal-proxy will present this cert
# for that hostname too. Until a multi-zone Origin CA cert is minted (or
# kamal-proxy gains per-host cert support), the influencekit.com zone
# should stay on CF "Flexible"; only the whinynil.co zone is safe to flip
# to "Full (Strict)". Tracked as a follow-up.
proxy:
  ssl:
    certificate_pem: ORIGIN_CERT
    private_key_pem: ORIGIN_KEY
  # Don't force HTTP→HTTPS at the origin. Cloudflare already redirects to
  # HTTPS at the edge, and during the CF "Flexible" → "Full (Strict)"
  # transition the CF→origin leg may still be plain HTTP for a short
  # window — letting both ports serve avoids a redirect loop.
  ssl_redirect: false
  # Multi-host: kamal-proxy will accept requests for any of these hostnames
  # and route to the same Rails app. The primary host is for the platform
  # itself; additional hosts are tenant-branded unsubscribe subdomains
  # (CNAME'd by the tenant to lewsnetter.whinynil.co and recorded in
  # Team::SesConfiguration#unsubscribe_host).
  #
  # Adding a new tenant unsubscribe host = append it here + redeploy.
  # Long-term we'd want this to be data-driven, but for MVP a static list
  # is fine while we have one tenant.
  hosts:
    - lewsnetter.whinynil.co
    - email.influencekit.com
  forward_headers: true
  app_port: 3000
  healthcheck:
    path: /up
    interval: 20

# Credentials for the image registry.
registry:
  server: ghcr.io
  username: bborn
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers.
env:
  clear:
    RAILS_LOG_TO_STDOUT: "true"
    RAILS_SERVE_STATIC_FILES: "true"
    BASE_URL: "https://lewsnetter.whinynil.co"
    HIDE_THINGS: "true"
    HIDE_EXAMPLES: "true"
    # Litestream → Cloudflare R2. Bucket `lewsnetter-litestream` was
    # provisioned in CF account 407493dfba8306ff79bb5cd68f609eb0 (ENAM).
    LITESTREAM_REPLICA_BUCKET: lewsnetter-litestream
    LITESTREAM_REPLICA_ENDPOINT: https://407493dfba8306ff79bb5cd68f609eb0.r2.cloudflarestorage.com
    LITESTREAM_REPLICA_REGION: auto
  secret:
    - RAILS_MASTER_KEY
    - LITESTREAM_REPLICA_ACCESS_KEY_ID
    - LITESTREAM_REPLICA_SECRET_ACCESS_KEY
    # Note: ORIGIN_CERT / ORIGIN_KEY are NOT exposed to the app containers.
    # They're consumed by the proxy block above via Kamal's native
    # `proxy.ssl.{certificate_pem,private_key_pem}` mechanism, which reads
    # them directly from .kamal/secrets and uploads to the host before
    # bind-mounting into the kamal-proxy container.

# Persistent storage for SQLite databases + Active Storage uploads.
# Bind on the host: /var/lib/docker/volumes/lewsnetter_storage/_data
volumes:
  - "lewsnetter_storage:/rails/storage"

# Bridge fingerprinted assets between versions so in-flight requests don't 404.
asset_path: /rails/public/assets

builder:
  arch: amd64

# SSH config — using the dedicated lewsnetter-deploy keypair generated for
# this server. `keys` lets kamal load the right key without depending on
# ssh-agent state. In CI the workflow writes the private key to
# ~/.ssh/id_ed25519 instead and the keys: list still works because that path
# falls back to the default identity if the listed path doesn't exist on disk.
ssh:
  user: root
  keys_only: false
  # CI runners have the deploy key at ~/.ssh/id_ed25519; local has it at
  # ~/.ssh/lewsnetter_deploy. List both — net-ssh tries each in order.
  keys:
    - ~/.ssh/lewsnetter_deploy
    - ~/.ssh/id_ed25519

# Note: top-level `healthcheck:` was removed in Kamal 2. The proxy block
# above declares the health probe Kamal uses for rolling restarts (/up).
