# Kamal 2 deploy config for Lewsnetter v2.
#
# Single Hetzner CPX21 box in Ashburn, VA (lewsnetter-app1, 178.156.185.100)
# runs two container roles off the same image:
#   - web    Rails + Litestream replicator + Solid Cable (Puma on :3000)
#   - worker Solid Queue worker process
#
# SQLite databases live on a named volume (lewsnetter_storage) at /rails/storage.
# Litestream streams them to Cloudflare R2 — see litestream.yml.
#
# Secrets live in .kamal/secrets (not committed) and GitHub Actions secrets
# for CI deploys.

service: lewsnetter

# Container image — pushed to GHCR by the build step on each deploy.
image: bborn/lewsnetter

# The web container runs migrations + idempotent backfills (db:prepare +
# app:boot_backfills) in one Rails boot before Puma starts listening, so
# first-boot readiness still takes ~10s+. Give the health check generous
# headroom (vs. the 30s default) so a slow-but-fine boot doesn't fail the
# deploy. Paired with proxy.healthcheck.interval below, which polls /up every 5s.
deploy_timeout: 60

servers:
  web:
    hosts:
      - 178.156.185.100
    options:
      add-host: host.docker.internal:host-gateway
  worker:
    hosts:
      - 178.156.185.100
    cmd: bundle exec rake solid_queue:start

# Cloudflare proxy is ON in front of this app (orange-cloud). We terminate
# TLS at kamal-proxy using a Cloudflare Origin CA certificate (cert + key
# stashed in .kamal/secrets as ORIGIN_CERT / ORIGIN_KEY) so the CF→origin
# leg is also encrypted. With this in place Bruno flips CF SSL mode from
# "Flexible" to "Full (Strict)" in the dashboard.
#
# Mechanism: Option A — Kamal 2's native `proxy.ssl.{certificate_pem,
# private_key_pem}` keys (see Kamal::Configuration::Proxy#custom_ssl_certificate?
# and Kamal::Cli::App::SslCertificates). Kamal reads the named secrets from
# .kamal/secrets and, before each app boot, uploads them to the host TLS
# directory and bind-mounts them into the kamal-proxy container as
# /home/kamal-proxy/.apps-config/<service>/<role>/tls/{cert,key}.pem. No
# host-side bind-mount hook needed.
#
# Note: the Origin CA cert SANs are lewsnetter.dev + *.lewsnetter.dev. It is
# trusted ONLY by Cloudflare's edge, not by browsers. That's fine for hosts
# behind our own CF orange-cloud (lewsnetter.dev, app.lewsnetter.dev), which
# can run CF "Full (Strict)".
#
# Tenant-branded hosts (e.g. e.influencekit.com) reach us by
# CNAME'ing to email.lewsnetter.dev — a GREY-cloud (DNS-only) record that
# resolves straight to this origin IP. A grey-cloud target is what avoids
# Cloudflare error 1014: a cross-account CNAME may not point at a *proxied*
# CF record, so it must point at a plain IP. The tenant keeps their own
# subdomain orange-clouded in their CF zone, so their CF terminates TLS with
# their own valid cert. The CF→origin leg lands here presenting the
# *.lewsnetter.dev cert (hostname won't match the tenant's), so the tenant
# zone must use CF "Full" — NOT "Full (Strict)", which rejects the mismatch.
proxy:
  ssl:
    certificate_pem: ORIGIN_CERT
    private_key_pem: ORIGIN_KEY
  # Don't force HTTP→HTTPS at the origin. Cloudflare already redirects to
  # HTTPS at the edge, and during the CF "Flexible" → "Full (Strict)"
  # transition the CF→origin leg may still be plain HTTP for a short
  # window — letting both ports serve avoids a redirect loop.
  ssl_redirect: false
  # Multi-host: kamal-proxy accepts requests for any of these hostnames and
  # routes them all to the same Rails app. lewsnetter.dev / app.lewsnetter.dev
  # are the platform itself. email.lewsnetter.dev is the grey-cloud CNAME
  # target tenants point their branded host at. The remaining entries are
  # live tenant-branded hosts (recorded in
  # Team::SesConfiguration#unsubscribe_host).
  #
  # Adding a new tenant host = append it here + redeploy. Long-term this
  # should be data-driven, but a static list is fine while tenants are few.
  hosts:
    - lewsnetter.dev          # marketing — landing + legal pages
    - app.lewsnetter.dev      # the product — sign-in, /account, /api, /mcp, /oauth
    - email.lewsnetter.dev    # grey-cloud CNAME target for tenant branded hosts
    - e.influencekit.com      # tenant (InfluenceKit) — unsub, tracking, images
  forward_headers: true
  app_port: 3000
  # Poll /up every 5s (vs Kamal's default) so the proxy catches Puma as soon
  # as it's listening — see the deploy_timeout note above re: slow boot.
  healthcheck:
    path: /up
    interval: 5

# Credentials for the image registry.
registry:
  server: ghcr.io
  username: bborn
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers.
env:
  clear:
    RAILS_LOG_TO_STDOUT: "true"
    RAILS_SERVE_STATIC_FILES: "true"
    # The Rails-side BASE_URL is the app surface (used for OAuth callbacks,
    # unsubscribe links in emails, MCP metadata, API docs).
    BASE_URL: "https://app.lewsnetter.dev"
    # Marketing helper uses this to build cross-host CTAs from the apex
    # landing page over to the app subdomain. Self-hosters running a
    # single-host deployment leave it unset and links resolve same-host.
    APP_BASE_URL: "https://app.lewsnetter.dev"
    # The marketing apex. Public::HomeController bounces anonymous visitors
    # who hit the app subdomain back here. Self-hosters on a single host
    # leave it unset and the bounce resolves same-host via root_url.
    MARKETING_BASE_URL: "https://lewsnetter.dev"
    # DNS CNAME target tenants point their branded unsubscribe/tracking
    # subdomain at (shown in the Email Sending setup UI). Must be a DNS-only
    # / grey-cloud host that resolves straight to the origin — see the proxy
    # block's TLS note re: Cloudflare error 1014. Self-hosters on a single
    # host leave it unset; it falls back to the BASE_URL host.
    BRANDED_HOST_CNAME_TARGET: "email.lewsnetter.dev"
    # Operator contact for legal/abuse — surfaced in legal pages + footer.
    LEWSNETTER_LEGAL_EMAIL: "legal@lewsnetter.dev"
    LEWSNETTER_ABUSE_EMAIL: "abuse@lewsnetter.dev"
    HIDE_THINGS: "true"
    HIDE_EXAMPLES: "true"
    # ── OPTIONAL: Cloudflare R2 backup (Litestream) ───────────────────────
    # R2 is OPT-IN. Setting LITESTREAM_REPLICA_BUCKET is the single switch
    # that turns on R2 for both Litestream DB backups AND Active Storage
    # uploads — bin/docker-entrypoint gates the litestream restore/replicate
    # on this var, and config/environments/production.rb routes Active Storage
    # to R2 when it's present (else to the /rails/storage volume).
    #
    # For a MINIMAL, volume-only deploy (no Cloudflare account needed),
    # DELETE these three lines — SQLite + uploads then live entirely on the
    # persistent lewsnetter_storage volume and survive redeploys.
    #
    # The matching R2 credentials live in env.secret below; with R2 enabled
    # they must also be set in .kamal/secrets.
    #
    # Bucket `lewsnetter-litestream` was provisioned in CF account
    # 407493dfba8306ff79bb5cd68f609eb0 (ENAM) for the hosted deployment.
    LITESTREAM_REPLICA_BUCKET: lewsnetter-litestream
    LITESTREAM_REPLICA_ENDPOINT: https://407493dfba8306ff79bb5cd68f609eb0.r2.cloudflarestorage.com
    LITESTREAM_REPLICA_REGION: auto
    # ──────────────────────────────────────────────────────────────────────
    # Stripe price IDs aren't sensitive (they're public refs to your
    # pricing config). The secret keys live in env.secret below.
    STRIPE_PRODUCT_PRO_MONTHLY_2026_PRICE_ID: price_1TYDKzJJh96TtdCTaNDgbtqa
    # Comma-separated list of operator email addresses that bypass the SES
    # connection paywall. Anything else in the app is free for everyone.
    BILLING_EXEMPT_EMAILS: "bruno@influencekit.com"
    # Open public signups now that billing is wired (gate lives in
    # config/routes.rb). Flip to "false" to disable signups again.
    LEWSNETTER_PUBLIC_SIGNUPS: "true"
    # Operator emails (comma-separated) granted access to the /admin/avo
    # console + /sidekiq dashboard via BulletTrain's User#developer? helper.
    # Same env var also gates app/models/ability.rb's elevated CanCan
    # abilities. Self-hosters: override this with your own admin emails.
    DEVELOPER_EMAILS: "bruno@influencekit.com"
  secret:
    # Required for any deploy.
    - RAILS_MASTER_KEY
    - STRIPE_PUBLISHABLE_KEY
    - STRIPE_SECRET_KEY
    - STRIPE_WEBHOOKS_ENDPOINT_SECRET
    - SENTRY_DSN
    # OPTIONAL: Cloudflare R2 backup credentials (paired with the
    # LITESTREAM_REPLICA_* block in env.clear above). These are listed so the
    # hosted deployment injects them, but they are NOT mandatory — for a
    # volume-only deploy leave them EMPTY in .kamal/secrets:
    #
    #   LITESTREAM_REPLICA_ACCESS_KEY_ID=
    #   LITESTREAM_REPLICA_SECRET_ACCESS_KEY=
    #
    # Kamal injects the empty values, litestream is never invoked (the
    # entrypoint gates on LITESTREAM_REPLICA_BUCKET), and nothing breaks.
    # An empty value is fine; a key MISSING from .kamal/secrets makes Kamal
    # error — so keep the lines, just blank, on the no-R2 path.
    - LITESTREAM_REPLICA_ACCESS_KEY_ID
    - LITESTREAM_REPLICA_SECRET_ACCESS_KEY
    # Note: ORIGIN_CERT / ORIGIN_KEY are NOT exposed to the app containers.
    # They're consumed by the proxy block above via Kamal's native
    # `proxy.ssl.{certificate_pem,private_key_pem}` mechanism, which reads
    # them directly from .kamal/secrets and uploads to the host before
    # bind-mounting into the kamal-proxy container.

# Persistent storage for SQLite databases + Active Storage uploads.
# Bind on the host: /var/lib/docker/volumes/lewsnetter_storage/_data
volumes:
  - "lewsnetter_storage:/rails/storage"

# Bridge fingerprinted assets between versions so in-flight requests don't 404.
asset_path: /rails/public/assets

builder:
  arch: amd64

# SSH config — using the dedicated lewsnetter-deploy keypair generated for
# this server. `keys` lets kamal load the right key without depending on
# ssh-agent state. In CI the workflow writes the private key to
# ~/.ssh/id_ed25519 instead and the keys: list still works because that path
# falls back to the default identity if the listed path doesn't exist on disk.
ssh:
  user: root
  keys_only: false
  # CI runners have the deploy key at ~/.ssh/id_ed25519; local has it at
  # ~/.ssh/lewsnetter_deploy. List both — net-ssh tries each in order.
  keys:
    - ~/.ssh/lewsnetter_deploy
    - ~/.ssh/id_ed25519

# Note: top-level `healthcheck:` was removed in Kamal 2. The proxy block
# above declares the health probe Kamal uses for rolling restarts (/up).
