# Action Cable on Solid Cable — backed by the `cable` SQLite database
# defined in config/database.yml. Replaces the Redis adapter that Bullet
# Train ships with by default.

development:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
