# SQLite on Rails 8. We use the three-database layout that Rails 8 ships as
# default for production (primary, queue, cable) and mirror it in development
# and test so behavior is consistent across environments. All three live in
# storage/ which is gitignored.
#
# Why SQLite here even though Bullet Train defaults to Postgres: Litestream-
# to-S3 for backups, one-file deploy story for OSS self-hosters, and Rails 8's
# actual default.

default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/lewsnetter_development.sqlite3
  queue:
    <<: *default
    database: storage/lewsnetter_development_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/lewsnetter_development_cable.sqlite3
    migrations_paths: db/cable_migrate

# Warning: The database defined as "test" will be erased and re-generated from
# your development database when you run "rake". Do not set this db to the
# same as development or production.
test:
  <%
    # Mirror the worktree-aware naming we had on Postgres so concurrent test
    # runs in sibling worktrees don't fight over the same SQLite file.
    worktree_suffix = begin
      worktree_path = `git rev-parse --show-toplevel 2>/dev/null`.strip
      if worktree_path.present?
        File.basename(worktree_path).gsub(/[^a-zA-Z0-9_]/, "_")
      else
        ""
      end
    rescue
      ""
    end
    worktree_suffix = "_#{worktree_suffix}" if worktree_suffix.present?
    test_env_number = ENV["TEST_ENV_NUMBER"]
  %>
  primary:
    <<: *default
    database: storage/lewsnetter_test<%= worktree_suffix %><%= test_env_number %>.sqlite3
  queue:
    <<: *default
    database: storage/lewsnetter_test<%= worktree_suffix %><%= test_env_number %>_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/lewsnetter_test<%= worktree_suffix %><%= test_env_number %>_cable.sqlite3
    migrations_paths: db/cable_migrate

production:
  primary:
    <<: *default
    database: storage/lewsnetter_production.sqlite3
  queue:
    <<: *default
    database: storage/lewsnetter_production_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/lewsnetter_production_cable.sqlite3
    migrations_paths: db/cable_migrate
