<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1440px; height: 900px; background: #18181b; font-family: 'Geist', system-ui, sans-serif; color: #fafafa; -webkit-font-smoothing: antialiased; overflow: hidden; }
  .stage { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 120px; position: relative; }
  .eyebrow { font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #fb923c; margin-bottom: 32px; opacity: 0; animation: fadeUp 0.6s 0.1s forwards; }
  h1 { font-family: 'Geist', sans-serif; font-size: 80px; font-weight: 600; letter-spacing: -0.025em; line-height: 1.05; margin-bottom: 28px; opacity: 0; animation: fadeUp 0.7s 0.3s forwards; }
  .sub { font-size: 22px; color: #a1a1aa; line-height: 1.5; max-width: 720px; margin-bottom: 56px; opacity: 0; animation: fadeUp 0.7s 0.55s forwards; }
  .cta { display: inline-block; background: #ea580c; color: #fff; font-size: 22px; font-weight: 500; padding: 18px 36px; border-radius: 8px; opacity: 0; animation: fadeUp 0.6s 0.8s forwards; }
  .footer { position: absolute; bottom: 56px; left: 120px; right: 120px; display: flex; justify-content: space-between; align-items: baseline; font-family: 'Geist Mono', monospace; font-size: 13px; color: #a1a1aa; letter-spacing: 0.06em; opacity: 0; animation: fadeUp 0.6s 1.1s forwards; }
  .footer .left { text-transform: uppercase; }
  .footer .right { color: #d4d4d8; }
  .accent-bar { position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: #ea580c; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
  <div class="stage">
    <div class="accent-bar"></div>
    <div class="eyebrow">Free during beta · Open source</div>
    <h1>Ship your first<br>campaign tonight.</h1>
    <p class="sub">Sign up, connect SES, send yourself a test — about five minutes from now.</p>
    <div class="cta">lewsnetter.dev</div>
    <div class="footer">
      <div class="left">github.com/bborn/lewsnetter</div>
      <div class="right">MIT licensed · MCP-native</div>
    </div>
  </div>
</body>
</html>
