# Build, push to GHCR, and Kamal-deploy Lewsnetter on push to master.
#
# See initiatives/lewsnetter-v2/DEPLOY.md for the secret matrix and the list
# of repo secrets that must be configured in
# https://github.com/bborn/lewsnetter/settings/secrets/actions before this
# workflow can succeed.

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ruby-vips (loaded via image_processing for Active Storage variants)
      # dlopens libvips.so.42 at app boot. Without it, even `rails db:test:prepare`
      # crashes before doing anything.
      - name: Install system deps (libvips)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libvips42

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: .ruby-version
          bundler-cache: true

      # `cache: yarn` runs before corepack is enabled, so it uses the system
      # yarn (1.22.x) and chokes on package.json's "packageManager: yarn@4.2.2".
      # Skip the cache step here; corepack enable + yarn install is fast enough.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable corepack + install yarn deps
        run: |
          corepack enable
          yarn install --immutable

      # Tests render real ERB; sprockets/propshaft needs assets precompiled.
      - name: Precompile assets
        env:
          RAILS_ENV: test
          SECRET_KEY_BASE: dummy-secret-key-base-for-tests-only
        run: bundle exec rails assets:precompile

      # mjml-rails dispatches the CLI; install matches Gemfile bound version.
      - name: Install MJML CLI
        run: npm install -g mjml@5.2.1

      - name: Prepare test database
        run: bundle exec rails db:test:prepare

      # Scope the smoke suite to the directories we own. The wider Bullet Train
      # scaffolded suite has pre-existing failures unrelated to Lewsnetter v2
      # work — widen this back to `bin/rails test` once those are cleaned up.
      - name: Run scoped tests
        run: bundle exec rails test test/services test/jobs test/controllers/account

  deploy:
    name: Build + deploy
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: .ruby-version
          bundler-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up SSH for Kamal
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # printf %s preserves embedded newlines from the secret value;
          # `echo "..."` in some shells silently mangles backslash sequences.
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Sanity: confirm the key parses before we hand it to ssh.
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          # ssh-keyscan + Net::SSH host-key matching is flaky across multiple
          # host key types (RSA vs ED25519). For an ephemeral runner connecting
          # to a known IP authenticated via the deploy key, accepting new host
          # keys is the pragmatic choice.
          cat > ~/.ssh/config <<EOF
          Host $SERVER_HOST
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config
          ssh-keyscan -t ed25519,rsa "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      # Kamal 2 reads named secrets from .kamal/secrets, which is gitignored
      # because it holds real credentials locally. Materialize it from GitHub
      # secrets right before deploy. Format: each line is sourced as bash, so
      # multi-line PEM values must be quoted heredoc-style or single-line.
      - name: Write .kamal/secrets and deploy
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          LITESTREAM_REPLICA_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_REPLICA_ACCESS_KEY_ID }}
          LITESTREAM_REPLICA_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_REPLICA_SECRET_ACCESS_KEY }}
          ORIGIN_CERT: ${{ secrets.ORIGIN_CERT }}
          ORIGIN_KEY: ${{ secrets.ORIGIN_KEY }}
        run: |
          mkdir -p .kamal
          umask 077
          {
            printf 'KAMAL_REGISTRY_PASSWORD=%q\n' "$KAMAL_REGISTRY_PASSWORD"
            printf 'RAILS_MASTER_KEY=%q\n'         "$RAILS_MASTER_KEY"
            printf 'LITESTREAM_REPLICA_ACCESS_KEY_ID=%q\n'     "$LITESTREAM_REPLICA_ACCESS_KEY_ID"
            printf 'LITESTREAM_REPLICA_SECRET_ACCESS_KEY=%q\n' "$LITESTREAM_REPLICA_SECRET_ACCESS_KEY"
            # Multi-line PEM values: use $'...' bash quoting so newlines survive.
            printf 'ORIGIN_CERT=%q\n' "$ORIGIN_CERT"
            printf 'ORIGIN_KEY=%q\n'  "$ORIGIN_KEY"
          } > .kamal/secrets
          chmod 600 .kamal/secrets
          bundle exec kamal deploy
