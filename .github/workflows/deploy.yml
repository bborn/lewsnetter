# Build, push to GHCR, and Kamal-deploy Lewsnetter on push to master.
#
# Required repo secrets (configure at
# https://github.com/bborn/lewsnetter/settings/secrets/actions):
#   SSH_PRIVATE_KEY                     deploy key for Kamal SSH
#   SERVER_HOST                         the production server IP/hostname
#   RAILS_MASTER_KEY                    decrypts config/credentials.yml.enc
#   LITESTREAM_REPLICA_ACCESS_KEY_ID    Cloudflare R2 access key
#   LITESTREAM_REPLICA_SECRET_ACCESS_KEY  Cloudflare R2 secret

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ruby-vips (loaded via image_processing for Active Storage variants)
      # dlopens libvips.so.42 at app boot. Without it, even `rails db:test:prepare`
      # crashes before doing anything.
      - name: Install system deps (libvips)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libvips42

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: .ruby-version
          bundler-cache: true

      # `cache: yarn` runs before corepack is enabled, so it uses the system
      # yarn (1.22.x) and chokes on package.json's "packageManager: yarn@4.2.2".
      # Skip the cache step here; corepack enable + yarn install is fast enough.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable corepack + install yarn deps
        run: |
          corepack enable
          yarn install --immutable

      # Tests render real ERB; sprockets/propshaft needs assets precompiled.
      - name: Precompile assets
        env:
          RAILS_ENV: test
          SECRET_KEY_BASE: dummy-secret-key-base-for-tests-only
        run: bundle exec rails assets:precompile

      # mjml-rails dispatches the CLI; install matches Gemfile bound version.
      - name: Install MJML CLI
        run: npm install -g mjml@5.2.1

      - name: Prepare test database
        run: bundle exec rails db:test:prepare

      # Scope the smoke suite to the directories we own. The wider Bullet Train
      # scaffolded suite has pre-existing failures unrelated to Lewsnetter v2
      # work — widen this back to `bin/rails test` once those are cleaned up.
      - name: Run scoped tests
        run: bundle exec rails test test/services test/jobs test/controllers/account

  deploy:
    name: Build + deploy
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: .ruby-version
          bundler-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up SSH for Kamal
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # printf %s preserves embedded newlines from the secret value;
          # `echo "..."` in some shells silently mangles backslash sequences.
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Sanity: confirm the key parses before we hand it to ssh.
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          # Hetzner hosts present BOTH RSA and ED25519 host keys. ssh-keyscan
          # without -t grabs all available types so net-ssh can match whichever
          # algorithm it negotiates.
          ssh-keyscan -t rsa,ecdsa,ed25519 "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # Pre-seed by IP too — net-ssh may store the resolved address.
          SERVER_IP=$(dig +short "$SERVER_HOST" | head -1)
          [ -n "$SERVER_IP" ] && ssh-keyscan -t rsa,ecdsa,ed25519 "$SERVER_IP" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 600 ~/.ssh/known_hosts

      # Kamal 2 reads named secrets from .kamal/secrets (gitignored). The
      # file is dotenv-parsed: single-line values are KEY=value, multi-line
      # values (PEM) must be double-quoted with literal newlines. printf %s
      # preserves embedded newlines from the GitHub secret value as-is.
      - name: Write .kamal/secrets and deploy
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          LITESTREAM_REPLICA_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_REPLICA_ACCESS_KEY_ID }}
          LITESTREAM_REPLICA_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_REPLICA_SECRET_ACCESS_KEY }}
          ORIGIN_CERT: ${{ secrets.ORIGIN_CERT }}
          ORIGIN_KEY: ${{ secrets.ORIGIN_KEY }}
        run: |
          mkdir -p .kamal
          umask 077
          {
            printf 'KAMAL_REGISTRY_PASSWORD=%s\n' "$KAMAL_REGISTRY_PASSWORD"
            printf 'RAILS_MASTER_KEY=%s\n'         "$RAILS_MASTER_KEY"
            printf 'LITESTREAM_REPLICA_ACCESS_KEY_ID=%s\n'     "$LITESTREAM_REPLICA_ACCESS_KEY_ID"
            printf 'LITESTREAM_REPLICA_SECRET_ACCESS_KEY=%s\n' "$LITESTREAM_REPLICA_SECRET_ACCESS_KEY"
            # Dotenv multi-line: KEY="line1\nline2\n..." with real newlines
            # inside the double quotes.
            printf 'ORIGIN_CERT="%s"\n' "$ORIGIN_CERT"
            printf 'ORIGIN_KEY="%s"\n'  "$ORIGIN_KEY"
          } > .kamal/secrets
          chmod 600 .kamal/secrets
          bundle exec kamal deploy
