# Build, push to GHCR, and Kamal-deploy Lewsnetter on push to master.
#
# See initiatives/lewsnetter-v2/DEPLOY.md for the secret matrix and the list
# of repo secrets that must be configured in
# https://github.com/bborn/lewsnetter/settings/secrets/actions before this
# workflow can succeed.

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: .ruby-version
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Enable corepack + install yarn deps
        run: |
          corepack enable
          yarn install --frozen-lockfile

      - name: Prepare test database
        run: bundle exec rails db:test:prepare

      # Scope the smoke suite to the directories we own. The wider Bullet Train
      # scaffolded suite has pre-existing failures unrelated to Lewsnetter v2
      # work — widen this back to `bin/rails test` once those are cleaned up.
      - name: Run scoped tests
        run: bundle exec rails test test/services test/jobs test/controllers/account

  deploy:
    name: Build + deploy
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: .ruby-version
          bundler-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up SSH for Kamal
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Kamal deploy
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          LITESTREAM_REPLICA_ACCESS_KEY_ID: ${{ secrets.LITESTREAM_REPLICA_ACCESS_KEY_ID }}
          LITESTREAM_REPLICA_SECRET_ACCESS_KEY: ${{ secrets.LITESTREAM_REPLICA_SECRET_ACCESS_KEY }}
        run: bundle exec kamal deploy
