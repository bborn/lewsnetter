<!doctype html>
<html lang="en">
  <head>
    <title>Something went wrong · Lewsnetter</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      * { margin: 0; }
      html { font-size: 16px; }
      body {
        background: #FAFAFA;
        color: #3F3F46;
        font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        -webkit-font-smoothing: antialiased;
        line-height: 1.5;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      header { background: #ffffff; border-bottom: 1px solid #E4E4E7; }
      header .wrap { max-width: 48rem; margin: 0 auto; padding: 1.25rem 2rem; display: flex; align-items: center; }
      .brand { font-size: 0.9375rem; font-weight: 600; letter-spacing: -0.01em; color: #09090B; }
      .accent-dot { display: inline-block; width: 0.375rem; height: 0.375rem; border-radius: 9999px; background: #EA580C; margin-left: 0.375rem; vertical-align: middle; }
      main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
      .card {
        width: 100%; max-width: 32rem;
        background: #ffffff;
        border: 1px solid #E4E4E7;
        border-radius: 0.75rem;
        padding: 3rem 2rem;
        text-align: center;
      }
      .eyebrow {
        font-family: 'Geist Mono', ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 0.6875rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
        color: #E11D48; /* rose-600 */
        margin-bottom: 0.75rem;
      }
      h1 { font-size: 1.75rem; font-weight: 600; letter-spacing: -0.015em; color: #09090B; margin-bottom: 0.75rem; line-height: 1.15; }
      p { color: #52525B; margin-bottom: 1.75rem; }
      a.button {
        display: inline-block;
        background: #EA580C; color: #ffffff;
        padding: 0.625rem 1.25rem; border-radius: 0.375rem;
        text-decoration: none; font-weight: 500; font-size: 0.9375rem;
      }
      a.button:hover { background: #C2410C; }
      footer {
        padding: 1.5rem; text-align: center;
        font-family: 'Geist Mono', ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.08em;
        color: #A1A1AA;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #09090B; color: #D4D4D8; }
        header { background: #18181B; border-bottom-color: #27272A; }
        .brand { color: #FAFAFA; }
        .card { background: #18181B; border-color: #27272A; }
        h1 { color: #FAFAFA; }
        p { color: #A1A1AA; }
        .eyebrow { color: #FB7185; }
        footer { color: #52525B; }
        a.button { background: #FB923C; color: #18181B; }
        a.button:hover { background: #F97316; }
      }
    </style>
  </head>

  <body>
    <header>
      <div class="wrap">
        <span class="brand">Lewsnetter</span>
        <span class="accent-dot" aria-hidden="true"></span>
      </div>
    </header>

    <main>
      <div class="card">
        <div class="eyebrow">500 · internal server error</div>
        <h1>Something went wrong.</h1>
        <p>
          We logged the error and are looking at it. Hit reload or head back to the dashboard.
        </p>
        <a href="/" class="button">Back to dashboard →</a>
      </div>
    </main>

    <footer>
      Lewsnetter · AI-native email marketing
    </footer>
  </body>
</html>
