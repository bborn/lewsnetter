<!doctype html>
<html lang="en">
  <head>
    <title>404 — page not found · Lewsnetter</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      * { margin: 0; }
      html { font-size: 16px; }
      body {
        background: #f8fafc;
        color: #334155;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        font-weight: 400;
        line-height: 1.5;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      header {
        background: #ffffff;
        border-bottom: 1px solid #e2e8f0;
      }
      header .wrap {
        max-width: 48rem;
        margin: 0 auto;
        padding: 1.25rem 1.5rem;
      }
      .brand {
        font-size: 1.125rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: #0f172a;
      }
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 1.5rem;
      }
      .card {
        width: 100%;
        max-width: 32rem;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 1rem;
        box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        padding: 3rem 2rem;
        text-align: center;
      }
      .eyebrow {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #64748b;
        margin-bottom: 0.75rem;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 600;
        letter-spacing: -0.015em;
        color: #0f172a;
        margin-bottom: 0.75rem;
      }
      p {
        color: #475569;
        margin-bottom: 1.75rem;
      }
      a.button {
        display: inline-block;
        background: #2563eb;
        color: #ffffff;
        padding: 0.625rem 1.25rem;
        border-radius: 0.5rem;
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9375rem;
      }
      a.button:hover { background: #1d4ed8; }
      footer {
        padding: 1.5rem;
        text-align: center;
        font-size: 0.75rem;
        color: #94a3b8;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0f172a; color: #cbd5e1; }
        header { background: #1e293b; border-bottom-color: #334155; }
        .brand { color: #f1f5f9; }
        .card { background: #1e293b; border-color: #334155; box-shadow: none; }
        h1 { color: #f1f5f9; }
        p { color: #cbd5e1; }
        .eyebrow { color: #94a3b8; }
        footer { color: #64748b; }
      }
    </style>
  </head>

  <body>
    <header>
      <div class="wrap">
        <span class="brand">Lewsnetter</span>
      </div>
    </header>

    <main>
      <div class="card">
        <div class="eyebrow">404</div>
        <h1>Page not found</h1>
        <p>
          The page you're looking for doesn't exist. Maybe you wanted the dashboard?
        </p>
        <a href="/" class="button">Take me home &rarr;</a>
      </div>
    </main>

    <footer>
      Lewsnetter
    </footer>
  </body>
</html>
